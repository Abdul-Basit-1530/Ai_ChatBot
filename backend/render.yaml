services:
  - type: web
    name: mern-chat-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this in Render dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in Render dashboard